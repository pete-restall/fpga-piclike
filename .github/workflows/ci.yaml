name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - "master"
    paths:
      - ".github/workflows/**"
      - "src/**"
      - "build/**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Tools
        run: |
          set -e;
          sudo apt-get -q -y update;
          sudo apt-get -q -y install fpga-icestorm git haskell-stack iverilog nextpnr-ice40 yosys yosys-abc;
          npm install -g --ignore-scripts wavedrom;
          mkdir -p "${GITHUB_WORKSPACE}/build/tools" && pushd "${GITHUB_WORKSPACE}/build/tools";
          git clone https://github.com/zachjs/sv2v.git;
          pushd sv2v && make && popd;
          popd;

      - name: Test and Synthesise
        run: |
          set -e;
          SV2V="${GITHUB_WORKSPACE}/build/tools/svc2v/bin/sv2v";
          pushd "${GITHUB_WORKSPACE}/build";
          make --version;
          make all "SV2V=${SV2V}";
          popd;

      - uses: actions/upload-artifact@v6
        with:
          name: piclike-out
          if-no-files-found: error
          path: |
            ${{github.workspace}}/build/out
